apis:
- name: Roadmunk GraphQL API
  description: The Roadmunk (Strategic Roadmaps) GraphQL API provides programmatic
    access to roadmaps, items, milestones, key dates, portfolios, feedback, ideas,
    customers, contacts, accounts, and user management. The API supports full CRUD
    operations for most resources and is available across three regional gateways.
