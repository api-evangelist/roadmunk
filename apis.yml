name: Roadmunk
description: Roadmunk (now Strategic Roadmaps by Tempo) is a product roadmapping tool
  with a GraphQL API for managing roadmaps, items, milestones, swimlanes, feedback,
  and ideas. The API enables programmatic access to nearly all platform functions
  across regional gateways covering North America, Europe, and Asia-Pacific, using
  Bearer token authentication.
